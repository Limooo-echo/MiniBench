task:
  family: multiple_choice
  path: data/multiple_choice/tasks.jsonl
  limit: null
  task_ids: []

agent:
  name: cot
  samples: 3
  reasoning_temperature: 0.7
  final_temperature: 0.0
  max_reasoning_tokens: 1024

provider:
  name: siliconflow
  model: zai-org/GLM-5.2
  json_mode: true
  max_tokens: 64
  timeout: 120

run:
  output_dir: runs
  run_name: siliconflow-glm52-mcq
